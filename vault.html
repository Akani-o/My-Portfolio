<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TODO: Replace "yourdomain.com" with your real production domain -->
    <title>Project Archive · Agwu Kalu</title>

    <meta name="description" content="Browse all projects by Agwu Kalu — real websites built for businesses and brands across fashion, food, fitness, and commerce.">
    <meta property="og:title" content="Project Archive · Agwu Kalu">
    <meta property="og:description" content="All projects — real websites for real businesses and brands.">
    <meta property="og:image" content="https://yourdomain.com/assets/images/og-preview.jpg">

    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Same premium font stack as index -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #D4AF37;
            --gold-light: #F4E4A6;
            --gold-dark: #B8860B;
            --gold-muted: #8B7533;
            --black: #070707;
            --black-light: #111111;
            --black-lighter: #1a1a1a;
            --black-card: #0e0e0e;
            --white: #F0F0F0;
            --white-dim: #C8C8C8;
            --gray: #888888;
            --gray-light: #AAAAAA;
            --transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-spring: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            --shadow: 0 4px 20px rgba(0,0,0,0.5);
            --shadow-gold: 0 0 40px rgba(212,175,55,0.15);
            --gold-gradient: linear-gradient(135deg, var(--gold) 0%, #C9A227 30%, #e6c45e 60%, var(--gold-light) 100%);
            --gold-glow: 0 0 20px rgba(212,175,55,0.3);
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Space Grotesk', 'Inter', -apple-system, sans-serif;
            --font-ui: 'Inter', -apple-system, sans-serif;
        }

        html { scroll-behavior: smooth; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .aurora-layer, .noise-layer, .floating-shapes, .mouse-light, #bgCanvas { display: none !important; }
            .fade-in { opacity: 1; transform: none; filter: none; }
        }

        body {
            font-family: var(--font-body);
            background-color: var(--black);
            color: var(--white);
            line-height: 1.75;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            font-size: 16px;
            letter-spacing: 0.01em;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== CANVAS ===== */
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== AURORA ===== */
        .aurora-layer {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none; opacity: 0.35;
        }
        .aurora-blob {
            position: absolute; border-radius: 50%;
            filter: blur(100px); mix-blend-mode: screen;
        }
        .aurora-blob-v1 {
            width: 500px; height: 500px;
            background: rgba(212,175,55,0.03);
            top: -10%; left: -8%;
            animation: auroraV1 28s ease-in-out infinite;
        }
        .aurora-blob-v2 {
            width: 400px; height: 400px;
            background: rgba(212,175,55,0.02);
            bottom: -8%; right: -6%;
            animation: auroraV2 32s ease-in-out infinite;
        }
        @keyframes auroraV1 {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(60px, 40px) scale(1.1); }
        }
        @keyframes auroraV2 {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(-40px, -30px) scale(1.15); }
        }

        /* ===== NOISE ===== */
        .noise-layer {
            position: fixed; inset: 0; z-index: 1;
            pointer-events: none; opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat; background-size: 256px;
        }

        /* ===== MOUSE LIGHT ===== */
        .mouse-light {
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 70%);
            pointer-events: none; z-index: 2;
            will-change: transform;
        }

        /* ===== FLOATING SHAPES ===== */
        .floating-shapes {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 1; overflow: hidden;
        }
        .geo-shape { position: absolute; will-change: transform; }
        .geo-shape.ring-v {
            width: 250px; height: 250px;
            border: 1px solid rgba(212,175,55,0.04);
            border-radius: 50%;
            top: 15%; right: -3%;
            animation: geoV1 30s ease-in-out infinite;
        }
        .geo-shape.diamond-v {
            width: 60px; height: 60px;
            border: 1px solid rgba(212,175,55,0.05);
            bottom: 25%; left: 8%;
            animation: geoV2 22s ease-in-out infinite;
        }
        .geo-shape.line-v {
            width: 120px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.06), transparent);
            top: 60%; right: 20%;
            animation: geoV3 18s ease-in-out infinite;
        }
        @keyframes geoV1 {
            0%,100% { transform: translateY(0) rotate(0deg); opacity:0.4; }
            50% { transform: translateY(-35px) rotate(8deg); opacity:0.7; }
        }
        @keyframes geoV2 {
            0%,100% { transform: translateY(0) rotate(45deg); opacity:0.4; }
            50% { transform: translateY(-25px) rotate(50deg); opacity:0.8; }
        }
        @keyframes geoV3 {
            0%,100% { transform: scaleX(1); opacity:0.3; }
            50% { transform: scaleX(1.4); opacity:0.6; }
        }

        /* ===== NAV ===== */
        nav {
            background: rgba(7,7,7,0.75);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(212,175,55,0.08);
            transition: all 0.4s;
        }
        nav.scrolled {
            background: rgba(7,7,7,0.92);
            box-shadow: 0 4px 40px rgba(0,0,0,0.7);
        }
        .nav-inner {
            display: flex; justify-content: space-between;
            align-items: center; height: 72px;
        }

        .brand-mark {
            display: flex; align-items: center;
            text-decoration: none; transition: var(--transition);
        }
        .brand-mark:hover {
            transform: scale(1.04);
            filter: drop-shadow(0 0 8px rgba(212,175,55,0.3));
        }
        .brand-ak {
            font-family: var(--font-display);
            font-size: 1.7rem; font-weight: 700;
            background: var(--gold-gradient);
            -webkit-background-clip: text; background-clip: text;
            color: transparent; letter-spacing: 2px;
        }
        .brand-tree { display: inline-flex; align-items: center; margin: 0 6px; opacity: 0.7; transition: var(--transition); }
        .brand-mark:hover .brand-tree { opacity: 1; }
        .brand-tree svg { width: 18px; height: 24px; }
        .brand-dj {
            font-family: var(--font-display);
            font-size: 1.2rem; font-weight: 600;
            background: linear-gradient(135deg, #D4AF37 0%, #C0392B 100%);
            -webkit-background-clip: text; background-clip: text;
            color: transparent; letter-spacing: 2px;
        }
        .brand-sep {
            color: rgba(212,175,55,0.25); margin: 0 14px;
            font-weight: 200; font-size: 1.2rem;
        }
        .brand-page-label {
            font-size: 0.7rem; font-weight: 600;
            color: var(--gold); text-transform: uppercase;
            letter-spacing: 3px; font-family: var(--font-ui);
        }

        .home-btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 0.5rem 1.5rem;
            border-radius: 40px; font-weight: 600;
            text-decoration: none; transition: var(--transition-spring);
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 0.85rem; font-family: var(--font-ui);
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        .home-btn:hover {
            background: var(--gold); color: var(--black);
            box-shadow: var(--gold-glow);
            transform: translateY(-2px) scale(1.02);
        }
        .home-btn:focus-visible {
            outline: 3px solid var(--gold-light); outline-offset: 3px;
        }

        /* ===== VAULT HEADER ===== */
        .vault-header {
            text-align: center;
            padding: 6rem 0 2.5rem;
            position: relative; z-index: 10;
        }
        .vault-header h1 {
            font-family: var(--font-display);
            font-size: clamp(2.2rem, 5vw, 3.4rem);
            font-weight: 600; color: var(--white);
            margin-bottom: 0.6rem; letter-spacing: 0.02em;
        }
        .vault-header h1 .gold-word {
            background: var(--gold-gradient);
            -webkit-background-clip: text; background-clip: text;
            color: transparent;
        }
        .vault-header p {
            color: var(--gray); font-size: 1.05rem;
            max-width: 600px; margin: 0 auto;
            line-height: 1.7; font-family: var(--font-body);
        }
        .project-count {
            display: inline-block;
            background: rgba(212,175,55,0.05);
            color: var(--gold); padding: 0.35rem 1.2rem;
            border-radius: 30px;
            border: 1px solid rgba(212,175,55,0.12);
            font-size: 0.75rem; font-weight: 600;
            margin-top: 1.2rem;
            font-family: var(--font-ui);
            letter-spacing: 1px; text-transform: uppercase;
        }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            position: sticky; top: 72px; z-index: 90;
            background: rgba(7,7,7,0.82);
            backdrop-filter: blur(24px);
            padding: 1.2rem 0; margin-bottom: 3rem;
            border-bottom: 1px solid rgba(212,175,55,0.06);
            transition: all 0.3s;
        }
        .filter-container {
            display: flex; justify-content: center;
            flex-wrap: wrap; gap: 0.7rem;
        }
        .filter-btn {
            background: transparent;
            border: 1.5px solid rgba(212,175,55,0.15);
            color: var(--gray-light);
            padding: 0.55rem 1.6rem;
            font-weight: 600; border-radius: 40px;
            cursor: pointer; transition: var(--transition-spring);
            font-size: 0.82rem; font-family: var(--font-ui);
            letter-spacing: 0.8px; text-transform: uppercase;
        }
        .filter-btn:hover {
            border-color: var(--gold); color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212,175,55,0.08);
        }
        .filter-btn:focus-visible {
            outline: 3px solid var(--gold-light); outline-offset: 3px;
        }
        .filter-btn.active {
            background: var(--gold-gradient);
            color: var(--black);
            border-color: var(--gold-light);
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(212,175,55,0.2);
        }

        /* ===== PROJECT GRID ===== */
        .projects-archive {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 4rem;
            position: relative; z-index: 10;
        }

        .archive-card-wrapper {
            perspective: 1000px;
        }

        .archive-card {
            background: var(--black-card);
            border-radius: 22px; overflow: hidden;
            border: 1px solid rgba(212,175,55,0.05);
            transition: var(--transition-spring);
            transform-style: preserve-3d;
            will-change: transform;
            position: relative;
        }
        .archive-card:hover {
            border-color: rgba(212,175,55,0.22);
            box-shadow: 0 35px 60px rgba(0,0,0,0.5), 0 0 40px rgba(212,175,55,0.05);
        }
        /* Specular highlight */
        .archive-card::before {
            content: '';
            position: absolute; inset: 0;
            border-radius: 22px; z-index: 5;
            background: linear-gradient(135deg, rgba(255,255,255,0.015) 0%, transparent 50%);
            pointer-events: none;
        }

        .archive-image {
            position: relative; height: 200px;
            overflow: hidden; background: #080808;
        }
        .archive-image::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, var(--black-card), transparent 45%);
            pointer-events: none;
        }
        .archive-img {
            width: 100%; height: 100%;
            object-fit: cover; object-position: top;
            transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .archive-card:hover .archive-img {
            transform: scale(1.06);
        }

        .archive-category-badge {
            position: absolute; top: 14px; left: 14px;
            font-size: 0.6rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            background: rgba(7,7,7,0.7);
            backdrop-filter: blur(10px);
            color: var(--gold-light);
            padding: 0.3rem 0.9rem; border-radius: 30px;
            border: 1px solid rgba(212,175,55,0.12);
            z-index: 6; font-family: var(--font-ui);
            transition: var(--transition);
        }
        .archive-card:hover .archive-category-badge {
            border-color: rgba(212,175,55,0.3);
            box-shadow: 0 0 10px rgba(212,175,55,0.12);
        }

        .archive-content {
            padding: 1.5rem; position: relative; z-index: 3;
        }
        .archive-content h3 {
            font-size: 1.1rem; font-weight: 600;
            color: var(--white); margin-bottom: 0.5rem;
            font-family: var(--font-body); letter-spacing: 0.01em;
        }
        .archive-content p {
            color: var(--gray); font-size: 0.85rem;
            line-height: 1.65; margin-bottom: 1rem;
            font-family: var(--font-body);
        }
        .archive-tech {
            display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem;
        }
        .archive-tag {
            background: rgba(212,175,55,0.04);
            color: var(--gold); padding: 0.2rem 0.7rem;
            border-radius: 30px; font-size: 0.65rem;
            font-weight: 600; border: 1px solid rgba(212,175,55,0.1);
            font-family: var(--font-ui); letter-spacing: 0.5px;
            text-transform: uppercase; transition: var(--transition);
        }
        .archive-card:hover .archive-tag {
            background: rgba(212,175,55,0.06);
            border-color: rgba(212,175,55,0.18);
        }

        .archive-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--gold); font-size: 0.8rem;
            font-weight: 600; text-decoration: none;
            transition: var(--transition-spring);
            padding: 8px 20px;
            border: 1.5px solid rgba(212,175,55,0.15);
            border-radius: 40px;
            font-family: var(--font-ui);
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        .archive-link:hover {
            background: var(--gold); color: var(--black);
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212,175,55,0.15);
        }

        .no-results {
            grid-column: 1 / -1; text-align: center;
            padding: 4rem 2rem; color: var(--gray);
            font-family: var(--font-body);
        }

        /* ===== CTA SECTION ===== */
        .vault-cta-section {
            text-align: center; padding: 5rem 0;
            position: relative; z-index: 10;
        }
        .vault-cta-section h3 {
            font-family: var(--font-display);
            font-size: 2rem; color: var(--white);
            margin-bottom: 0.8rem; letter-spacing: 0.02em;
        }
        .vault-cta-section p {
            color: var(--gray); margin-bottom: 2rem;
            font-size: 1rem; font-family: var(--font-body);
        }
        .vault-cta-section .btn-cta {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 14px 36px;
            background: #25D366; color: #fff;
            font-weight: 700; border: none; border-radius: 50px;
            cursor: pointer; transition: var(--transition-spring);
            box-shadow: 0 4px 20px rgba(37,211,102,0.25);
            text-decoration: none; font-size: 0.9rem;
            font-family: var(--font-ui); letter-spacing: 0.5px;
        }
        .vault-cta-section .btn-cta:hover {
            background: #1ebe5d;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 14px 40px rgba(37,211,102,0.35);
        }

        /* ===== FOOTER ===== */
        .vault-footer {
            text-align: center; padding: 3rem 0;
            border-top: 1px solid rgba(212,175,55,0.06);
            position: relative; z-index: 10;
        }
        .vault-footer p { color: var(--gray); font-size: 0.82rem; font-family: var(--font-body); }
        .vault-footer .footer-brand {
            font-family: var(--font-display);
            color: var(--gold); font-weight: 600; font-size: 1rem;
        }

        /* ===== FADE IN ===== */
        .fade-in {
            opacity: 0;
            transform: translateY(35px) scale(0.98);
            filter: blur(3px);
            transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1),
                        transform 0.8s cubic-bezier(0.16,1,0.3,1),
                        filter 0.8s cubic-bezier(0.16,1,0.3,1);
        }
        .fade-in.appear { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .projects-archive { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .projects-archive { grid-template-columns: 1fr; }
            .vault-header { padding: 4.5rem 0 2rem; }
            .brand-sep, .brand-page-label { display: none; }
            .geo-shape.ring-v { display: none; }
            .aurora-blob-v1 { width: 300px; height: 300px; }
            .aurora-blob-v2 { width: 250px; height: 250px; }
        }
        @media (max-width: 480px) {
            .filter-btn { padding: 0.45rem 1.1rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <!-- CANVAS -->
    <canvas id="bgCanvas" aria-hidden="true"></canvas>

    <!-- AURORA -->
    <div class="aurora-layer" aria-hidden="true">
        <div class="aurora-blob aurora-blob-v1"></div>
        <div class="aurora-blob aurora-blob-v2"></div>
    </div>

    <!-- NOISE -->
    <div class="noise-layer" aria-hidden="true"></div>

    <!-- MOUSE LIGHT -->
    <div class="mouse-light" id="mouseLight" aria-hidden="true"></div>

    <!-- FLOATING SHAPES -->
    <div class="floating-shapes" aria-hidden="true">
        <div class="geo-shape ring-v" data-parallax-speed="0.025"></div>
        <div class="geo-shape diamond-v" data-parallax-speed="0.04"></div>
        <div class="geo-shape line-v" data-parallax-speed="0.02"></div>
    </div>

    <!-- NAV -->
    <nav aria-label="Archive navigation">
        <div class="container nav-inner">
            <div style="display:flex;align-items:center;">
                <a href="index.html" class="brand-mark" aria-label="Home">
                    <span class="brand-ak">AK</span>
                    <span class="brand-tree" aria-hidden="true">
                        <svg viewBox="0 0 18 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <line x1="9" y1="24" x2="9" y2="8" stroke="url(#tg2)" stroke-width="1.5" stroke-linecap="round"/>
                            <line x1="9" y1="14" x2="4" y2="8" stroke="url(#tg2)" stroke-width="1" stroke-linecap="round"/>
                            <line x1="9" y1="14" x2="14" y2="8" stroke="url(#tg2)" stroke-width="1" stroke-linecap="round"/>
                            <line x1="9" y1="10" x2="5" y2="4" stroke="url(#tg2)" stroke-width="0.8" stroke-linecap="round"/>
                            <line x1="9" y1="10" x2="13" y2="4" stroke="url(#tg2)" stroke-width="0.8" stroke-linecap="round"/>
                            <circle cx="9" cy="3" r="2.5" fill="none" stroke="url(#tg2)" stroke-width="0.8"/>
                            <defs><linearGradient id="tg2" x1="9" y1="0" x2="9" y2="24" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#D4AF37"/><stop offset="100%" stop-color="#8B7533"/></linearGradient></defs>
                        </svg>
                    </span>
                    <span class="brand-dj">DJ</span>
                </a>
                <span class="brand-sep">|</span>
                <span class="brand-page-label">Archive</span>
            </div>
            <a href="index.html" class="home-btn"><i class="fas fa-arrow-left" aria-hidden="true"></i> Home</a>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="vault-header fade-in">
                <h1>Project <span class="gold-word">Archive</span></h1>
                <p>Every website I've built — real projects for real businesses and brands, all live and hosted.</p>
                <div class="project-count" id="projectCount" aria-live="polite">Showing 9 projects</div>
            </div>
        </div>

        <div class="filter-bar">
            <div class="container filter-container" role="group" aria-label="Filter projects by category">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="business">Business</button>
                <button class="filter-btn" data-filter="fashion">Fashion</button>
                <button class="filter-btn" data-filter="food">Food & Bakery</button>
                <button class="filter-btn" data-filter="fitness">Fitness</button>
                <button class="filter-btn" data-filter="retail">Retail</button>
            </div>
        </div>

        <div class="container">
            <div class="projects-archive" id="archiveGrid" role="list" aria-label="Project archive"></div>
        </div>

        <div class="container">
            <div class="vault-cta-section fade-in">
                <h3>Like what you see?</h3>
                <p>I'd love to build something for your business too.</p>

    <footer class="vault-footer container">
        <p>&copy; <span id="currentYear"></span> <span class="footer-brand">Agwu Kalu</span> · Software Engineer</p>

    <script>
    (function () {
        'use strict';

        var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        var isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        var isMobile = window.innerWidth < 768;

        document.getElementById('currentYear').textContent = new Date().getFullYear();

        /* ===== PROJECT DATA ===== */
        var projects = [
            {
                name: 'Kanloper Enterprises',
                category: 'business', categoryLabel: 'Business',
                description: 'Professional website for an import company specializing in materials from India, China, Turkey, Pakistan, Bangladesh, and Australia.',
                tech: ['HTML', 'CSS', 'JavaScript'],
                url: 'https://kanloperenterprises.vercel.app/',
                image: 'assets/projects/kanloper.jpg',
                badge: 'Real Business'
            },
            {
                name: 'Classic Cuts',
                category: 'business', categoryLabel: 'Business',
                description: 'Community barbershop website with barber profiles, service listings, gallery, and appointment booking.',
                tech: ['HTML', 'CSS', 'JavaScript', 'Tailwind'],
                url: 'https://classiccutss.vercel.app/',
                image: 'assets/projects/classiccuts.jpg',
                badge: 'Brand Website'
            },
            {
                name: 'Bistro Italiano',
                category: 'food', categoryLabel: 'Food & Bakery',
                description: 'Modern restaurant website with menu, reservation flow, photo gallery, and a warm, appetizing design.',
                tech: ['HTML', 'CSS', 'JavaScript', 'Tailwind'],
                url: 'https://bistroitaliano.vercel.app/',
                image: 'assets/projects/bistro.jpg',
                badge: 'Restaurant'
            },
            {
                name: 'STITCH ELEGANTO',
                category: 'fashion', categoryLabel: 'Fashion',
                description: 'Elegant tailoring and bespoke fashion portfolio — showcasing services, process, portfolio work, and client testimonials.',
                tech: ['HTML', 'CSS', 'JavaScript'],
                url: 'https://stitcheleganto.vercel.app/',
                image: 'assets/projects/stitcheleganto.jpg',
                badge: 'Fashion'
            },
            {
                name: 'Sweebtzy',
                category: 'food', categoryLabel: 'Food & Bakery',
                description: 'Bakery website featuring services, signature creations, customer reviews, FAQ, and ordering.',
                tech: ['HTML', 'CSS', 'JavaScript'],
                url: 'https://sweebtzy.vercel.app/',
                image: 'assets/projects/sweebtzy.jpg',
                badge: 'Bakery'
            },
            {
                name: 'Daily Mart',
                category: 'retail', categoryLabel: 'Retail',
                description: 'Local grocery store website with shop listings, weekly specials, about page, and contact.',
                tech: ['HTML', 'CSS', 'JavaScript'],
                url: 'https://dailymart-kappa.vercel.app/',
                image: 'assets/projects/dailymart.jpg',
                badge: 'Retail'
            },
            {
                name: 'Peak Fitness',
                category: 'fitness', categoryLabel: 'Fitness',
                description: 'Gym website with class schedules, trainer profiles, membership tiers, amenities showcase, and gallery.',
                tech: ['HTML', 'CSS', 'JavaScript'],
                url: 'https://peakfitnesss.vercel.app/',
                image: 'assets/projects/peakfitness.jpg',
                badge: 'Fitness'
            },
            {
                name: 'Shally Wardrobe',
                category: 'fashion', categoryLabel: 'Fashion',
                description: 'Fashion designer portfolio showcasing collections, services, and brand story with smooth transitions.',
                tech: ['HTML', 'CSS', 'JavaScript'],
                url: 'https://shally-mu.vercel.app/',
                image: 'assets/projects/shally.jpg',
                badge: 'Fashion'
            },
            {
                name: 'Elara Fashion',
                category: 'fashion', categoryLabel: 'Fashion',
                description: 'Women\'s fashion website with modern collections, about section, and clean visual storytelling.',
                tech: ['HTML', 'CSS', 'JavaScript'],
                url: 'https://elaraa.name.ng/',
                image: 'assets/projects/elara.jpg',
                badge: 'Fashion'
            }
        ];

        var grid = document.getElementById('archiveGrid');
        var countEl = document.getElementById('projectCount');

        /* Scroll observer */
        var scrollObserver = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                    entry.target.classList.add('appear');
                    scrollObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.05, rootMargin: '0px 0px -50px 0px' });

        function renderProjects(filter) {
            grid.innerHTML = '';
            var filtered = filter === 'all' ? projects : projects.filter(function (p) { return p.category === filter; });

            countEl.textContent = 'Showing ' + filtered.length + ' project' + (filtered.length !== 1 ? 's' : '');

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">No projects found in this category.</div>';
                return;
            }

            filtered.forEach(function (project, index) {
                var wrapper = document.createElement('div');
                wrapper.className = 'archive-card-wrapper';

                var card = document.createElement('div');
                card.className = 'archive-card fade-in';
                card.setAttribute('role', 'listitem');
                card.style.transitionDelay = (index * 0.07) + 's';

                card.innerHTML =
                    '<div class="archive-image">' +
                        '<img src="' + project.image + '" alt="' + project.name + '" class="archive-img" loading="lazy" ' +
                        'onerror="this.parentElement.innerHTML=\'<div style=&quot;display:flex;align-items:center;justify-content:center;height:100%;background:#111;color:#D4AF37;font-size:0.85rem;text-align:center;padding:1.5rem&quot;><span>' + project.name + '<br><small style=&quot;color:#666&quot;>Screenshot coming soon</small></span></div>\'">' +
                        '<span class="archive-category-badge">' + project.badge + '</span>' +
                    '</div>' +
                    '<div class="archive-content">' +
                        '<h3>' + project.name + '</h3>' +
                        '<p>' + project.description + '</p>' +
                        '<div class="archive-tech">' +
                            project.tech.map(function (t) { return '<span class="archive-tag">' + t + '</span>'; }).join('') +
                        '</div>' +
                        '<a href="' + project.url + '" class="archive-link" target="_blank" rel="noopener noreferrer">' +
                            '<i class="fas fa-external-link-alt" aria-hidden="true"></i> View Live' +
                        '</a>' +
                    '</div>';

                /* 3D tilt */
                if (!isTouchDevice && !prefersReducedMotion) {
                    card.addEventListener('mousemove', function (e) {
                        var rect = card.getBoundingClientRect();
                        var cx = rect.left + rect.width / 2;
                        var cy = rect.top + rect.height / 2;
                        var px = (e.clientX - cx) / (rect.width / 2);
                        var py = (e.clientY - cy) / (rect.height / 2);
                        var rx = py * -5;
                        var ry = px * 5;
                        var sx = px * -12;
                        var sy = py * -12;
                        card.style.transform = 'perspective(800px) rotateX(' + rx + 'deg) rotateY(' + ry + 'deg) translateZ(8px) translateY(-8px)';
                        card.style.boxShadow = sx + 'px ' + (sy + 25) + 'px 50px rgba(0,0,0,0.4), 0 0 35px rgba(212,175,55,0.05)';
                        card.style.transition = 'none';
                    });
                    card.addEventListener('mouseleave', function () {
                        card.style.transform = '';
                        card.style.boxShadow = '';
                        card.style.transition = 'all 0.5s cubic-bezier(0.34,1.56,0.64,1)';
                    });
                }

                wrapper.appendChild(card);
                grid.appendChild(wrapper);
            });

            /* Observe new cards */
            grid.querySelectorAll('.fade-in').forEach(function (f) { scrollObserver.observe(f); });
        }

        /* Filter buttons */
        var filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(function (btn) {
            btn.addEventListener('click', function () {
                filterBtns.forEach(function (b) { b.classList.remove('active'); });
                this.classList.add('active');
                renderProjects(this.getAttribute('data-filter'));
            });
        });

        renderProjects('all');

        /* Page-level fade-ins */
        document.querySelectorAll('.vault-header.fade-in, .vault-cta-section.fade-in').forEach(function (f) {
            scrollObserver.observe(f);
        });

        /* ===== PARTICLE CANVAS (lighter) ===== */
        var canvas = document.getElementById('bgCanvas');
        var ctx = canvas.getContext('2d');
        var particles = [];
        var dustParticles = [];
        var particleCount = isMobile ? 25 : 45;
        var dustCount = isMobile ? 10 : 20;
        var time = 0;
        var rafId;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        var resizeT;
        window.addEventListener('resize', function () { clearTimeout(resizeT); resizeT = setTimeout(resizeCanvas, 150); });

        function Particle() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.z = Math.random() * 800;
            this.vx = (Math.random() - 0.5) * 0.2;
            this.vy = (Math.random() - 0.5) * 0.2;
            this.vz = (Math.random() - 0.5) * 0.35;
            this.size = Math.random() * 1.2 + 0.3;
            this.po = Math.random() * Math.PI * 2;
            this.ps = 0.01 + Math.random() * 0.015;
        }
        Particle.prototype.update = function (t) {
            this.x += this.vx; this.y += this.vy; this.z += this.vz;
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
            if (this.z < 0) this.z = 800;
            if (this.z > 800) this.z = 0;
        };
        Particle.prototype.draw = function (t) {
            var scale = (800 - this.z) / 800;
            var pulse = Math.sin(t * this.ps + this.po) * 0.3 + 0.7;
            var s = this.size * scale * pulse;
            ctx.beginPath();
            ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(212,175,55,' + (scale * 0.4 * pulse) + ')';
            ctx.fill();
        };

        function DustP() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vy = -0.04 - Math.random() * 0.08;
            this.vx = (Math.random() - 0.5) * 0.1;
            this.s = Math.random() * 0.6 + 0.2;
            this.o = Math.random() * 0.2 + 0.03;
            this.life = Math.random() * 500 + 200;
            this.age = Math.random() * this.life;
        }
        DustP.prototype.update = function () {
            this.x += this.vx; this.y += this.vy; this.age++;
            if (this.age > this.life || this.y < -10) {
                this.y = canvas.height + 10;
                this.x = Math.random() * canvas.width;
                this.age = 0;
            }
        };
        DustP.prototype.draw = function () {
            var lf = 1 - Math.abs((this.age / this.life) * 2 - 1);
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(212,175,55,' + (this.o * lf) + ')';
            ctx.fill();
        };

        for (var i = 0; i < particleCount; i++) particles.push(new Particle());
        for (var j = 0; j < dustCount; j++) dustParticles.push(new DustP());

        function animate() {
            if (prefersReducedMotion) return;
            time++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (var a = 0; a < particles.length; a++) { particles[a].update(time); particles[a].draw(time); }
            /* Connections */
            for (var b = 0; b < particles.length; b++) {
                for (var c = b + 1; c < particles.length; c++) {
                    var dx = particles[b].x - particles[c].x;
                    var dy = particles[b].y - particles[c].y;
                    var d = Math.sqrt(dx*dx + dy*dy);
                    if (d < 110) {
                        var depthF = ((800 - particles[b].z) / 800 + (800 - particles[c].z) / 800) / 2;
                        ctx.beginPath();
                        ctx.moveTo(particles[b].x, particles[b].y);
                        ctx.lineTo(particles[c].x, particles[c].y);
                        ctx.strokeStyle = 'rgba(212,175,55,' + ((1 - d/110) * 0.05 * depthF) + ')';
                        ctx.lineWidth = 0.4;
                        ctx.stroke();
                    }
                }
            }
            for (var e = 0; e < dustParticles.length; e++) { dustParticles[e].update(); dustParticles[e].draw(); }
            rafId = requestAnimationFrame(animate);
        }
        document.addEventListener('visibilitychange', function () {
            if (document.hidden) cancelAnimationFrame(rafId);
            else if (!prefersReducedMotion) animate();
        });
        if (!prefersReducedMotion) animate();

        /* Mouse light */
        var mouseLight = document.getElementById('mouseLight');
        if (isTouchDevice) { mouseLight.style.display = 'none'; }
        else if (!prefersReducedMotion) {
            var mlX = 0, mlY = 0, mlTX = 0, mlTY = 0;
            document.addEventListener('mousemove', function (e) { mlTX = e.clientX; mlTY = e.clientY; }, { passive: true });
            (function animML() {
                mlX += (mlTX - mlX) * 0.06;
                mlY += (mlTY - mlY) * 0.06;
                mouseLight.style.transform = 'translate(' + (mlX - 300) + 'px,' + (mlY - 300) + 'px)';
                requestAnimationFrame(animML);
            })();
        }

        /* Scroll parallax for floating shapes */
        var scrollY = 0, targetSY = 0;
        var pShapes = document.querySelectorAll('[data-parallax-speed]');
        if (!prefersReducedMotion) {
            window.addEventListener('scroll', function () { targetSY = window.pageYOffset; }, { passive: true });
            (function pLoop() {
                scrollY += (targetSY - scrollY) * 0.1;
                pShapes.forEach(function (s) {
                    var speed = parseFloat(s.getAttribute('data-parallax-speed'));
                    s.style.transform = 'translateY(' + (scrollY * speed * -1) + 'px)';
                });
                requestAnimationFrame(pLoop);
            })();
        }

        /* Nav scroll */
        var navEl = document.querySelector('nav');
        window.addEventListener('scroll', function () {
            navEl.classList.toggle('scrolled', window.scrollY > 60);
        }, { passive: true });

    })();
    </script>
